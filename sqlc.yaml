version: "2" # 配置文件版本，v2 支持多数据库和多语言
sql:
  - engine: "postgresql"          # 数据库类型：postgresql, mysql 或 sqlite
    queries: "./db/query/"        # SQL 查询语句（SELECT/INSERT等）所在的目录
    schema: "./db/migration/"     # 数据库表结构（DDL/CREATE TABLE）所在的目录
    gen:
      go:                         # 生成 Go 语言代码
        package: "db"             # 生成代码的 Go 包名（package name）
        out: "./db/sqlc"          # 代码输出的目标目录
        emit_json_tags: true      # 结构体是否自带 JSON 标签（用于 API 返回）
        emit_prepared_queries: false # 是否生成预编译语句代码（提高重复执行效率）
        emit_interface: true     # 是否生成接口（开启后方便做单元测试 Mock）
        emit_exact_table_names: false # 结构体名是否保留表名复数（false 则 users 变 User）
        emit_empty_slices: true  # 切片字段是否在空时返回空切片而非 null