<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>用电详情 — ElecLog</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/echarts@5/dist/echarts.min.js"></script>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/flatpickr/dist/flatpickr.min.css">
  <link rel="stylesheet" type="text/css" href="https://npmcdn.com/flatpickr/dist/themes/dark.css">
  <script src="https://cdn.jsdelivr.net/npm/flatpickr"></script>
  <script src="https://cdn.jsdelivr.net/npm/flatpickr/dist/l10n/zh.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #0f1117;
      --surface: #1a1d27;
      --surface2: #22263a;
      --border: #2d3148;
      --accent: #4f9cf9;
      --accent-hover: #6aaeff;
      --green: #34d399;
      --yellow: #fbbf24;
      --red: #f87171;
      --purple: #a78bfa;
      --text: #e8eaf6;
      --text-muted: #8890b0;
      --radius: 14px;
    }
    body {
      font-family: 'Inter', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex; flex-direction: column;
    }
    header {
      display: flex; align-items: center; gap: 0.8rem;
      padding: 0.9rem 1.5rem;
      border-bottom: 1px solid var(--border);
      background: rgba(26,29,39,0.9);
      backdrop-filter: blur(12px);
    }
    .back-btn {
      background: none; border: 1px solid var(--border); color: var(--text-muted);
      border-radius: 8px; padding: 0.35rem 0.7rem; font-size: 0.82rem; font-family: inherit;
      cursor: pointer; transition: all 0.2s; display: flex; align-items: center; gap: 0.3rem;
    }
    .back-btn:hover { border-color: var(--accent); color: var(--accent); }
    .header-title { font-weight: 600; font-size: 1rem; }
    .header-sub { display: none; }
    /* 问题1: 加宽最大宽度，让全屏模式下内容占满更多空间 */
    .content { flex: 1; display: flex; flex-direction: column; padding: 1.25rem 1.5rem; min-height: 0; max-width: 1400px; margin: 0 auto; width: 100%; }

    /* 统计卡片 */
    .stats { display: grid; grid-template-columns: repeat(5, 1fr); gap: 0.9rem; margin-bottom: 1rem; }
    .stat-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 1rem 1.2rem;
    }
    .stat-label { font-size: 0.75rem; color: var(--text-muted); margin-bottom: 0.4rem; display: flex; align-items: center; gap: 0.4rem; }
    .stat-value { font-size: 1.5rem; font-weight: 700; font-variant-numeric: tabular-nums; }
    .stat-value.good { color: var(--green); }
    .stat-value.warn { color: var(--yellow); }
    .stat-value.low  { color: var(--red); }

    /* 筛选栏 */
    .filter-bar {
      display: flex; align-items: center; justify-content: space-between;
      flex-wrap: wrap; gap: 0.5rem; margin-bottom: 0.9rem;
    }
    .quick-btns { display: flex; flex-wrap: wrap; gap: 0.4rem; }
    .qbtn {
      background: var(--surface2); border: 1px solid var(--border); color: var(--text-muted);
      border-radius: 7px; padding: 0.35rem 0.75rem; font-size: 0.8rem; font-family: inherit;
      cursor: pointer; transition: all 0.15s;
    }
    .qbtn:hover { border-color: var(--accent); color: var(--accent); }
    .qbtn.active { background: var(--accent); border-color: var(--accent); color: #fff; }
    /* 问题6: 日期范围组件改为统一容器 */
    .date-range-picker {
      display: flex; align-items: center;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 0.15rem 0.35rem;
      gap: 0.2rem;
      transition: border-color 0.2s;
    }
    .date-range-picker:focus-within { border-color: var(--accent); }
    .date-range-picker input[type="date"] {
      background: transparent; border: none; color: var(--text);
      font-size: 0.8rem; font-family: inherit;
      outline: none; cursor: pointer;
      padding: 0.3rem 0.4rem;
    }
    .date-range-picker .sep {
      color: var(--text-muted); font-size: 0.75rem; user-select: none;
    }
    .search-btn {
      background: var(--accent); border: none; color: #fff;
      border-radius: 6px; padding: 0.35rem 0.85rem; font-size: 0.8rem; font-family: inherit;
      cursor: pointer; transition: background 0.15s; margin-left: 0.35rem;
    }
    .search-btn:hover { background: var(--accent-hover); }
    .clear-btn {
      background: none; border: 1px solid var(--border); color: var(--text-muted);
      border-radius: 6px; padding: 0.35rem 0.65rem; font-size: 0.8rem; font-family: inherit;
      cursor: pointer; transition: all 0.15s;
    }
    .clear-btn:hover { border-color: var(--red); color: var(--red); }

    /* 图表 - 问题1: 增大图表高度 */
    .chart-wrap {
      height: 550px;
      flex: none;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      position: relative;
    }
    #chart { width: 100%; height: 100%; }
    .chart-overlay {
      position: absolute; inset: 0;
      display: flex; align-items: center; justify-content: center;
      color: var(--text-muted); font-size: 0.9rem;
      border-radius: var(--radius);
      background: var(--surface);
    }

    .error-msg {
      background: rgba(248,113,113,0.1); border: 1px solid rgba(248,113,113,0.3);
      border-radius: 8px; color: var(--red); padding: 0.5rem 0.8rem; font-size: 0.82rem; margin-bottom: 0.8rem;
    }
    @media (max-width: 600px) {
      .stats { grid-template-columns: 1fr 1fr; }
      .filter-bar { flex-direction: column; align-items: flex-start; }
    }
  </style>
</head>
<body>
  <header>
    <button class="back-btn" onclick="history.back()">← 返回</button>
    <span class="header-title" id="headerTitle">房间用电详情</span>
  </header>

  <div class="content">
    <div class="stats">
      <div class="stat-card">
        <div class="stat-label">🏠 房间名称</div>
        <div class="stat-value" id="statRoom" style="font-size:1.1rem">—</div>
      </div>
      <div class="stat-card">
        <div class="stat-label">💰 当前余额</div>
        <div class="stat-value" id="statBalance">—</div>
      </div>
      <div class="stat-card">
        <div class="stat-label">⚡ 区间总用电</div>
        <div class="stat-value" id="statUsage" style="color:var(--accent)">0.00 度</div>
      </div>
      <div class="stat-card">
        <div class="stat-label">💸 区间耗电费</div>
        <div class="stat-value" id="statCost" style="color:#fb923c">0.00 元</div>
      </div>
      <div class="stat-card">
        <div class="stat-label">📅 展示时间范围</div>
        <div class="stat-value" id="statTimeRange" style="font-size:0.95rem; line-height: 1.5; margin-top:0.4rem">—<br>—</div>
      </div>
    </div>

    <div id="errorMsg" class="error-msg" style="display:none"></div>

    <div class="filter-bar">
      <div class="quick-btns" id="quickBtns">
        <button class="qbtn active" data-v="today">今天</button>
        <button class="qbtn" data-v="yesterday">昨天</button>
        <button class="qbtn" data-v="this_week">本周</button>
        <button class="qbtn" data-v="last_week">上周</button>
        <button class="qbtn" data-v="this_month">本月</button>
        <button class="qbtn" data-v="last_month">上月</button>
      </div>
      <!-- 问题6: 统一的日期范围选择组件 -->
      <div style="display:flex; align-items:center; gap:0.35rem;">
        <input type="text" id="dateRange" placeholder="选择起止日期" style="background:var(--surface2); border:1px solid var(--border); border-radius:8px; padding:0.4rem 0.6rem; color:var(--text); font-size:0.8rem; width:220px; font-family:inherit; outline:none; transition:border-color 0.2s;" onfocus="this.style.borderColor='var(--accent)'" onblur="this.style.borderColor='var(--border)'" />
        <button class="search-btn" onclick="doCustomSearch()">查询</button>
        <button class="clear-btn" onclick="doClearDateRange()">清空</button>
      </div>
    </div>

    <div class="chart-wrap">
      <div class="chart-overlay" id="chartOverlay" style="display:none">暂无数据</div>
      <div id="chart"></div>
    </div>
  </div>

  <script>
    const API = window.location.origin.includes('localhost') || window.location.protocol === 'file:'
      ? 'http://localhost:6060'
      : '/api';

    const params = new URLSearchParams(location.search);
    const roomId = parseInt(params.get('id') || '0');
    if (!roomId) { alert('无效的房间 ID'); history.back(); }

    const token = localStorage.getItem('accesstoken');
    const headers = token ? { Authorization: `Bearer ${token}` } : {};

    let myChart = null;
    let records = [];
    // 记录当前查询的时间范围，用于计算横坐标分度值
    let currentStartTime = null;
    let currentEndTime = null;

    // ——— ECharts 初始化 ———
    function initChart() {
      myChart = echarts.init(document.getElementById('chart'), 'dark');
      myChart.setOption({
        backgroundColor: 'transparent',
        tooltip: {
          trigger: 'axis',
          backgroundColor: '#1a1d27',
          borderColor: '#2d3148',
          textStyle: { color: '#e8eaf6' },
          // 问题4: hover时显示高亮点
          axisPointer: {
            type: 'cross',
            crossStyle: { color: '#8890b0' },
            lineStyle: { color: '#2d3148' }
          },
          formatter: function(params) {
            let html = `<div>${params[0].name}</div>`;
            let u = 0;
            params.forEach(p => {
              // 问题4: tooltip 里 marker 颜色与线颜色一致 (ECharts自动处理)
              html += `<div style="margin-top:4px">${p.marker} ${p.seriesName}: <span style="font-weight:600">${p.value !== undefined ? p.value : 0}</span></div>`;
              if (p.seriesName === '用电量(度)') u = p.value || 0;
            });
            let cost = (u * 0.53).toFixed(2);
            html += `<div style="margin-top:4px"><span style="display:inline-block;margin-right:4px;border-radius:10px;width:10px;height:10px;background-color:#fb923c;"></span> 电费(元): <span style="font-weight:600">${cost}</span></div>`;
            return html;
          }
        },
        legend: { data: ['用电量(度)', '余额(元)'], textStyle: { color: '#8890b0' }, top: 8 },
        // 问题7: 减小左右间距让图表起终点贴边
        grid: { top: 50, bottom: 50, left: 50, right: 55, containLabel: false },
        xAxis: {
          type: 'category',
          data: [],
          // 问题2+7: boundaryGap:false 让折线从最左边到最右边，坐标值与数据点对齐
          boundaryGap: false,
          axisLabel: { color: '#8890b0', fontSize: 11, rotate: 0 },
          axisLine: { lineStyle: { color: '#2d3148' } },
          axisTick: { alignWithLabel: true }
        },
        yAxis: [
          {
            type: 'value', name: '度',
            nameTextStyle: { color: '#8890b0' },
            splitLine: { lineStyle: { color: '#2d3148' } },
            axisLabel: { color: '#8890b0' },
            // 问题3: 纵坐标最小为0，不出现负数
            min: 0
          },
          {
            type: 'value', name: '元',
            nameTextStyle: { color: '#8890b0' },
            splitLine: { show: false },
            axisLabel: { color: '#8890b0' }
          },
        ],
        series: [
          {
            name: '用电量(度)', type: 'line', data: [], smooth: true,
            // 问题4: 统一线颜色
            itemStyle: { color: '#4f9cf9' },
            lineStyle: { width: 2, color: '#4f9cf9' },
            // 问题4: 默认不显示点，hover时显示高亮圆点
            symbol: 'circle', symbolSize: 6, showSymbol: false,
            emphasis: {
              focus: 'series',
              itemStyle: { color: '#4f9cf9', borderColor: '#fff', borderWidth: 2 }
            },
            areaStyle: {
              color: { type: 'linear', x:0,y:0,x2:0,y2:1,
                colorStops:[{offset:0,color:'rgba(79,156,249,0.2)'},{offset:1,color:'transparent'}]
              }
            }
          },
          {
            name: '余额(元)', type: 'line', yAxisIndex: 1, data: [], smooth: true,
            // 问题4: 统一线颜色
            itemStyle: { color: '#34d399' },
            lineStyle: { color: '#34d399', width: 2 },
            // 问题4: 默认不显示点，hover时显示高亮圆点
            symbol: 'circle', symbolSize: 6, showSymbol: false,
            emphasis: {
              focus: 'series',
              itemStyle: { color: '#34d399', borderColor: '#fff', borderWidth: 2 }
            },
            areaStyle: {
              color: { type: 'linear', x:0,y:0,x2:0,y2:1,
                colorStops:[{offset:0,color:'rgba(52,211,153,0.2)'},{offset:1,color:'transparent'}]
              }
            }
          },
        ],
      });
      window.addEventListener('resize', () => myChart?.resize());
    }

    // ——— 数据聚合 ———
    function round2(n) { return Math.round(n * 100) / 100; }

    // 问题5: 根据实际数据跨度灵活计算聚合单位和标签格式
    function calcTimeParams(spanHours) {
      const MAX_TICKS = 35;
      let bucketHours, labelFn;

      if (spanHours <= 24) {
        // 按天: 尝试1h一格
        bucketHours = 1;
        labelFn = (d) => `${String(d.getHours()).padStart(2,'0')}:00`;
      } else if (spanHours <= 24 * 7) {
        // 按周或不满一周: 动态计算
        // 先算如果1h一格有多少格
        const ticksAt1h = Math.ceil(spanHours / 1);
        if (ticksAt1h <= MAX_TICKS) {
          bucketHours = 1;
        } else {
          // 需要合并，计算最小合并小时数使得格数 < MAX_TICKS
          bucketHours = Math.ceil(spanHours / MAX_TICKS);
          // 取一个"好看"的值：1, 2, 3, 4, 6, 8, 12
          const niceValues = [1, 2, 3, 4, 6, 8, 12];
          for (const nv of niceValues) {
            if (nv >= bucketHours) { bucketHours = nv; break; }
          }
        }
        labelFn = (d) => `${d.getMonth()+1}/${d.getDate()} ${String(d.getHours()).padStart(2,'0')}:00`;
      } else {
        // 按月或更长: 以天为单位
        const spanDays = spanHours / 24;
        const ticksAt1d = Math.ceil(spanDays);
        if (ticksAt1d <= MAX_TICKS) {
          bucketHours = 24;
        } else {
          const bucketDays = Math.ceil(spanDays / MAX_TICKS);
          bucketHours = bucketDays * 24;
        }
        labelFn = (d) => `${d.getMonth()+1}/${d.getDate()}`;
      }
      return { bucketHours, labelFn };
    }

    function bucketStart(ms, bucketHours) {
      const d = new Date(ms);
      if (bucketHours >= 24) {
        d.setHours(0,0,0,0);
      } else {
        // 按 bucketHours 对齐
        const h = Math.floor(d.getHours() / bucketHours) * bucketHours;
        d.setHours(h, 0, 0, 0);
      }
      return d.getTime();
    }

    function buildChart(rows) {
      if (!rows.length) return { labels:[], usage:[], balance:[], balanceMin:undefined, balanceMax:undefined };

      const firstTime = new Date(rows[0].end_time).getTime();
      const lastTime = new Date(rows[rows.length-1].end_time).getTime();
      const spanH = (lastTime - firstTime) / 3600000;

      // 问题5: 动态计算时间参数
      const { bucketHours, labelFn } = calcTimeParams(spanH || 1);

      const map = new Map();
      for (const row of rows) {
        const t = new Date(row.end_time).getTime();
        const bkt = bucketStart(t, bucketHours);
        if (!map.has(bkt)) map.set(bkt, { usage: 0, balance: 0, t: bkt });
        map.get(bkt).usage += row.usage;
        map.get(bkt).balance = row.balance;
      }
      const pts = Array.from(map.values()).sort((a,b)=>a.t-b.t);

      const labels = pts.map(p => labelFn(new Date(p.t)));
      const usage = pts.map(p => round2(p.usage));
      const balance = pts.map(p => round2(p.balance));
      const bVals = balance.filter(v => v > 0);
      let balanceMin, balanceMax;
      if (bVals.length) {
        const bMin = Math.min(...bVals), bMax = Math.max(...bVals);
        const pad = Math.max((bMax-bMin)*0.3, 2);
        balanceMin = Math.floor(bMin - pad);
        balanceMax = Math.ceil(bMax + pad);
      }
      return { labels, usage, balance, balanceMin, balanceMax };
    }

    function updateChart() {
      const overlay = document.getElementById('chartOverlay');
      if (!records.length) {
        overlay.style.display = 'flex';
        myChart?.setOption({ xAxis: { data: [] }, series: [{ data: [] }, { data: [] }] });
        return;
      }
      overlay.style.display = 'none';
      const { labels, usage, balance, balanceMin, balanceMax } = buildChart(records);

      // 问题5: 计算 xAxis interval 保证刻度数 < 35
      let labelInterval = 0;
      if (labels.length > 35) {
        labelInterval = Math.ceil(labels.length / 35) - 1;
      }

      myChart.setOption({
        xAxis: {
          data: labels,
          axisLabel: {
            interval: labelInterval,
            rotate: labels.length > 20 ? 20 : 0
          }
        },
        yAxis: [ {}, { min: balanceMin, max: balanceMax } ],
        series: [{ data: usage }, { data: balance }],
      });

      // 更新区间用电统计
      const total = usage.reduce((s,v)=>s+v, 0);
      document.getElementById('statUsage').textContent = `${round2(total).toFixed(2)} 度`;
      document.getElementById('statCost').textContent = `${(total * 0.53).toFixed(2)} 元`;
    }

    // ——— 数据加载 ———
    function formatRangeDate(isoStr) {
      if (!isoStr) return '—';
      const d = new Date(isoStr);
      return `${d.getFullYear()}/${String(d.getMonth()+1).padStart(2,'0')}/${String(d.getDate()).padStart(2,'0')} ${String(d.getHours()).padStart(2,'0')}:${String(d.getMinutes()).padStart(2,'0')}`;
    }

    async function loadUsage(start, end) {
      currentStartTime = start;
      currentEndTime = end;
      
      const elRange = document.getElementById('statTimeRange');
      elRange.innerHTML = `${formatRangeDate(start)}<br>${formatRangeDate(end)}`;

      const errEl = document.getElementById('errorMsg');
      errEl.style.display = 'none';
      try {
        const res = await axios.get(`${API}/electricity-balances/hour-range/${roomId}`, {
          params: { start_time: start, end_time: end }, headers
        });
        records = res.data || [];
        updateChart();
      } catch (e) {
        errEl.textContent = '加载用电数据失败';
        errEl.style.display = 'block';
        records = [];
        updateChart();
      }
    }

    // ——— 快捷时间 ———
    const RANGES = {
      today:      () => { const s = startOfDay(new Date()); return [s, new Date()]; },
      yesterday:  () => { const d = new Date(); d.setDate(d.getDate()-1); return [startOfDay(d), endOfDay(d)]; },
      this_week:  () => { const d = new Date(); d.setDate(d.getDate()-d.getDay()); return [startOfDay(d), new Date()]; },
      last_week:  () => { const d = new Date(); d.setDate(d.getDate()-d.getDay()-7); const e = new Date(d); e.setDate(d.getDate()+6); return [startOfDay(d), endOfDay(e)]; },
      this_month: () => { const d = new Date(); d.setDate(1); return [startOfDay(d), new Date()]; },
      last_month: () => { const d = new Date(); d.setDate(1); d.setMonth(d.getMonth()-1); const e = new Date(d.getFullYear(), d.getMonth()+1, 0); return [startOfDay(d), endOfDay(e)]; },
    };
    function startOfDay(d) { const r=new Date(d); r.setHours(0,0,0,0); return r; }
    function endOfDay(d)   { const r=new Date(d); r.setHours(23,59,59,999); return r; }

    document.getElementById('quickBtns').addEventListener('click', e => {
      const btn = e.target.closest('.qbtn');
      if (!btn) return;
      document.querySelectorAll('.qbtn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      const [s, end] = RANGES[btn.dataset.v]();
      loadUsage(s.toISOString(), end.toISOString());
    });

    let dateRangePicker = flatpickr("#dateRange", {
      mode: "range",
      dateFormat: "Y-m-d",
      locale: "zh",
      maxDate: "today"
    });

    function doCustomSearch() {
      const dates = dateRangePicker.selectedDates;
      if (dates.length !== 2) { alert('请选择开始和结束日期'); return; }
      document.querySelectorAll('.qbtn').forEach(b => b.classList.remove('active'));
      loadUsage(startOfDay(dates[0]).toISOString(), endOfDay(dates[1]).toISOString());
    }

    function doClearDateRange() {
      dateRangePicker.clear();
      // 清空后回到"今天"
      document.querySelectorAll('.qbtn').forEach(b => b.classList.remove('active'));
      document.querySelector('.qbtn[data-v="today"]').classList.add('active');
      const [s, end] = RANGES['today']();
      loadUsage(s.toISOString(), end.toISOString());
    }

    // ——— 初始化 ———
    async function init() {
      initChart();
      try {
        const [ri, bi] = await Promise.all([
          axios.get(`${API}/rooms/${roomId}`, { headers }),
          axios.get(`${API}/electricity-balances/latest/${roomId}`, { headers }).catch(() => null),
        ]);
        const room = ri.data;
        document.title = `${room.name} — ElecLog`;
        document.getElementById('headerTitle').textContent = room.name;
        document.getElementById('statRoom').textContent = room.name;

        if (bi) {
          const yuan = bi.data.balance / 100;
          const balEl = document.getElementById('statBalance');
          balEl.textContent = `¥ ${yuan.toFixed(2)}`;
          balEl.className = 'stat-value ' + (yuan >= 15 ? 'good' : yuan >= 8 ? 'warn' : 'low');
        }
      } catch (e) {
        document.getElementById('errorMsg').textContent = '加载房间信息失败';
        document.getElementById('errorMsg').style.display = 'block';
      }
      // 默认加载今天
      const [s, end] = RANGES['today']();
      loadUsage(s.toISOString(), end.toISOString());
    }

    init();
  </script>
</body>
</html>
