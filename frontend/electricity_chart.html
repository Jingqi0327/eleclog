<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>宿舍电费监控系统</title>
    <!-- 引入外部资源 -->
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdn.jsdelivr.net/npm/font-awesome@4.7.0/css/font-awesome.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.8/dist/chart.umd.min.js"></script>
    
    <!-- 配置Tailwind -->
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        primary: '#3b82f6',
                        secondary: '#10b981',
                        warning: '#f59e0b',
                        danger: '#ef4444',
                        dark: '#1e293b'
                    },
                    fontFamily: {
                        sans: ['Inter', 'system-ui', 'sans-serif'],
                    },
                }
            }
        }
    </script>
    
    <style type="text/tailwindcss">
        @layer utilities {
            .content-auto {
                content-visibility: auto;
            }
            .card-shadow {
                box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1), 0 4px 6px -2px rgba(0, 0, 0, 0.05);
            }
            .gradient-bg {
                background: linear-gradient(135deg, #3b82f6 0%, #2563eb 100%);
            }
            .btn-active {
                @apply bg-primary text-white;
            }
            .btn-inactive {
                @apply bg-gray-200 text-gray-700 hover:bg-gray-300;
            }
            .payment-indicator {
                @apply inline-flex items-center px-2.5 py-0.5 rounded-full text-xs font-medium bg-green-100 text-green-800;
            }
            .date-picker-container {
                @apply flex items-center gap-3 mt-3 md:mt-0;
            }
            .date-input {
                @apply px-3 py-2 border border-gray-300 rounded-md text-sm focus:outline-none focus:ring-2 focus:ring-primary/50;
            }
            .alert-message {
                @apply p-4 mb-6 rounded-lg text-sm flex items-center;
            }
            .alert-warning {
                @apply bg-yellow-50 text-yellow-800 border border-yellow-200;
            }
        }
    </style>
</head>
<body class="bg-gray-50 font-sans">
    <header class="gradient-bg text-white shadow-lg">
        <div class="container mx-auto px-4 py-6">
            <h1 class="text-[clamp(1.5rem,3vw,2.5rem)] font-bold flex items-center">
                <i class="fa fa-bolt mr-3"></i>宿舍电费监控系统
            </h1>
            <p class="text-blue-100 mt-2">实时追踪宿舍电费使用情况与历史趋势</p>
        </div>
    </header>

    <main class="container mx-auto px-4 py-8">
        <!-- 系统消息提示区 -->
        <div id="system-alert" class="hidden"></div>
        
        <!-- 状态卡片 -->
        <div class="grid grid-cols-1 md:grid-cols-4 gap-6 mb-8">
            <div class="bg-white rounded-xl p-6 card-shadow transform transition hover:scale-105">
                <div class="flex items-center justify-between">
                    <div>
                        <p class="text-gray-500 font-medium">当前余额</p>
                        <h2 id="current-balance" class="text-3xl font-bold mt-1 text-primary">-- 元</h2>
                    </div>
                    <div class="w-12 h-12 rounded-full bg-blue-100 flex items-center justify-center">
                        <i class="fa fa-money text-primary text-xl"></i>
                    </div>
                </div>
                <div class="mt-4 text-sm text-gray-500">
                    <span>最后更新: </span>
                    <span id="last-update">--</span>
                </div>
            </div>
            
            <div class="bg-white rounded-xl p-6 card-shadow transform transition hover:scale-105">
                <div class="flex items-center justify-between">
                    <div>
                        <p class="text-gray-500 font-medium">筛选期用电量</p>
                        <h2 id="period-usage" class="text-3xl font-bold mt-1 text-secondary">-- 度</h2>
                    </div>
                    <div class="w-12 h-12 rounded-full bg-green-100 flex items-center justify-center">
                        <i class="fa fa-bolt text-secondary text-xl"></i>
                    </div>
                </div>
                <div class="mt-4 text-sm text-gray-500">
                    <span>筛选期电费: </span>
                    <span id="period-cost" class="text-primary">-- 元</span>
                </div>
            </div>
            
            <div class="bg-white rounded-xl p-6 card-shadow transform transition hover:scale-105">
                <div class="flex items-center justify-between">
                    <div>
                        <p class="text-gray-500 font-medium">记录总数</p>
                        <h2 id="record-count" class="text-3xl font-bold mt-1 text-secondary">0</h2>
                    </div>
                    <div class="w-12 h-12 rounded-full bg-green-100 flex items-center justify-center">
                        <i class="fa fa-database text-secondary text-xl"></i>
                    </div>
                </div>
                <div class="mt-4 text-sm text-gray-500">
                    <span>数据覆盖: </span>
                    <span id="date-range">-- 至 --</span>
                </div>
            </div>
            
            <div class="bg-white rounded-xl p-6 card-shadow transform transition hover:scale-105">
                <div class="flex items-center justify-between">
                    <div>
                        <p class="text-gray-500 font-medium">房间信息</p>
                        <h2 id="room-name" class="text-2xl font-bold mt-1 text-dark">--</h2>
                    </div>
                    <div class="w-12 h-12 rounded-full bg-purple-100 flex items-center justify-center">
                        <i class="fa fa-home text-purple-600 text-xl"></i>
                    </div>
                </div>
                <div class="mt-4 text-sm text-gray-500">
                    <span>电价: </span>
                    <span id="electricity-price" class="text-warning font-medium">0.53 元/度</span>
                </div>
            </div>
        </div>
        
        <!-- 图表控制区 -->
        <div class="bg-white rounded-xl p-6 card-shadow mb-8">
            <div class="flex flex-col md:flex-row justify-between items-start md:items-center mb-6 gap-4">
                <h2 class="text-xl font-bold text-gray-800">电费与用电量趋势</h2>
                
                <div class="w-full md:w-auto">
                    <!-- 快速时间筛选 -->
                    <div class="flex flex-wrap gap-2 mb-3">
                        <div class="text-sm font-medium text-gray-500 mr-2">快速筛选:</div>
                        <button id="btn-today" class="px-4 py-2 rounded-md text-sm btn-active transition">今天</button>
                        <button id="btn-yesterday" class="px-4 py-2 rounded-md text-sm btn-inactive transition">昨天</button>
                        <button id="btn-daybefore" class="px-4 py-2 rounded-md text-sm btn-inactive transition">前天</button>
                        <button id="btn-thisweek" class="px-4 py-2 rounded-md text-sm btn-inactive transition">本周</button>
                        <button id="btn-lastweek" class="px-4 py-2 rounded-md text-sm btn-inactive transition">上周</button>
                        <button id="btn-thismonth" class="px-4 py-2 rounded-md text-sm btn-inactive transition">本月</button>
                        <button id="btn-lastmonth" class="px-4 py-2 rounded-md text-sm btn-inactive transition">上月</button>
                    </div>
                    
                    <!-- 自定义日期筛选 -->
                    <div class="date-picker-container">
                        <div class="text-sm font-medium text-gray-500 mr-2">自定义范围:</div>
                        <input type="date" id="start-date" class="date-input" max="">
                        <span class="text-gray-500">至</span>
                        <input type="date" id="end-date" class="date-input" max="">
                        <button id="btn-custom" class="px-4 py-2 rounded-md text-sm bg-gray-200 text-gray-700 hover:bg-gray-300 transition">
                            确认
                        </button>
                    </div>
                </div>
            </div>
            
            <!-- 图表区域 -->
            <div class="h-[400px]">
                <canvas id="electricityChart"></canvas>
            </div>
            
            <!-- 数据说明 -->
            <div class="flex flex-wrap gap-4 mt-4 text-sm text-gray-600">
                <div class="flex items-center">
                    <span class="w-3 h-3 bg-primary rounded-full mr-2"></span>
                    <span>电费余额 (元)</span>
                </div>
                <div class="flex items-center">
                    <span class="w-3 h-3 bg-secondary rounded-full mr-2"></span>
                    <span>每小时用电量 (度)</span>
                </div>
                <div class="flex items-center">
                    <span class="w-3 h-3 bg-green-500 rounded-full mr-2"></span>
                    <span>缴费记录</span>
                </div>
            </div>
        </div>
        
        <!-- 数据表格 -->
        <div class="bg-white rounded-xl p-6 card-shadow">
            <h2 class="text-xl font-bold text-gray-800 mb-6">时段用电详情</h2>
            <div class="overflow-x-auto">
                <table class="min-w-full divide-y divide-gray-200">
                    <thead>
                        <tr>
                            <th class="px-6 py-3 bg-gray-50 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">时间段</th>
                            <th class="px-6 py-3 bg-gray-50 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">电费余额 (元)</th>
                            <th class="px-6 py-3 bg-gray-50 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">用电量 (度)</th>
                            <th class="px-6 py-3 bg-gray-50 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">电费 (元)</th>
                            <th class="px-6 py-3 bg-gray-50 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">备注</th>
                        </tr>
                    </thead>
                    <tbody id="data-table-body" class="bg-white divide-y divide-gray-200">
                        <!-- 数据将通过JavaScript动态填充 -->
                        <tr>
                            <td colspan="5" class="px-6 py-10 text-center text-gray-500">
                                <i class="fa fa-spinner fa-spin mr-2"></i>加载数据中...
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </main>

    <footer class="bg-dark text-gray-400 py-8 mt-12">
        <div class="container mx-auto px-4">
            <div class="flex flex-col md:flex-row justify-between items-center">
                <p>© 2025 宿舍电费监控系统</p>
                <div class="mt-4 md:mt-0">
                    <button id="refresh-data" class="text-gray-300 hover:text-white flex items-center">
                        <i class="fa fa-refresh mr-2"></i>刷新数据
                    </button>
                </div>
            </div>
        </div>
    </footer>

    <script>
        // 全局变量
        let electricityData = [];
        let processedData = []; // 处理后的数据，包含用电量
        let electricityChart = null;
        const ELECTRICITY_PRICE = 0.53; // 电价：0.53元/度
        let currentRangeType = 'today'; // 当前选中的时间范围类型
        // 数据文件路径 - 可根据实际情况修改
        const DATA_FILE_PATH = '/data/electricity_data.json';
        
        // 页面加载完成后初始化
        document.addEventListener('DOMContentLoaded', function() {
            // 设置日期选择器的最大日期为今天
            const today = new Date().toISOString().split('T')[0];
            document.getElementById('start-date').max = today;
            document.getElementById('end-date').max = today;
            
            // 尝试加载数据
            loadElectricityData();
            
            // 绑定刷新按钮事件
            document.getElementById('refresh-data').addEventListener('click', function() {
                showLoadingState();
                loadElectricityData();
            });
            
            // 绑定时间范围按钮事件
            document.getElementById('btn-today').addEventListener('click', function() {
                setActiveTimeButton('btn-today');
                currentRangeType = 'today';
                filterDataByRange('today');
            });
            
            document.getElementById('btn-yesterday').addEventListener('click', function() {
                setActiveTimeButton('btn-yesterday');
                currentRangeType = 'yesterday';
                filterDataByRange('yesterday');
            });
            
            document.getElementById('btn-daybefore').addEventListener('click', function() {
                setActiveTimeButton('btn-daybefore');
                currentRangeType = 'daybefore';
                filterDataByRange('daybefore');
            });
            
            document.getElementById('btn-thisweek').addEventListener('click', function() {
                setActiveTimeButton('btn-thisweek');
                currentRangeType = 'thisweek';
                filterDataByRange('thisweek');
            });
            
            document.getElementById('btn-lastweek').addEventListener('click', function() {
                setActiveTimeButton('btn-lastweek');
                currentRangeType = 'lastweek';
                filterDataByRange('lastweek');
            });
            
            document.getElementById('btn-thismonth').addEventListener('click', function() {
                setActiveTimeButton('btn-thismonth');
                currentRangeType = 'thismonth';
                filterDataByRange('thismonth');
            });
            
            document.getElementById('btn-lastmonth').addEventListener('click', function() {
                setActiveTimeButton('btn-lastmonth');
                currentRangeType = 'lastmonth';
                filterDataByRange('lastmonth');
            });
            
            // 自定义日期范围查询
            document.getElementById('btn-custom').addEventListener('click', function() {
                const startDate = document.getElementById('start-date').value;
                const endDate = document.getElementById('end-date').value;
                
                if (!startDate || !endDate) {
                    showAlert('请选择开始日期和结束日期', 'warning');
                    return;
                }
                
                if (new Date(startDate) > new Date(endDate)) {
                    showAlert('开始日期不能晚于结束日期', 'warning');
                    return;
                }
                
                // 重置所有按钮样式，标记自定义查询为活跃
                resetAllTimeButtons();
                document.getElementById('btn-custom').className = 'px-4 py-2 rounded-md text-sm btn-active transition';
                currentRangeType = 'custom';
                
                filterDataByCustomRange(startDate, endDate);
            });
        });
        
        // 显示加载状态
        function showLoadingState() {
            document.getElementById('data-table-body').innerHTML = `
                <tr>
                    <td colspan="5" class="px-6 py-10 text-center text-gray-500">
                        <i class="fa fa-spinner fa-spin mr-2"></i>加载数据中...
                    </td>
                </tr>
            `;
        }
        
        // 显示系统消息
        function showAlert(message, type = 'info') {
            const alertContainer = document.getElementById('system-alert');
            alertContainer.className = `alert-message alert-${type}`;
            alertContainer.innerHTML = `<i class="fa fa-${type === 'warning' ? 'exclamation-triangle' : 'info-circle'} mr-2"></i>${message}`;
            alertContainer.classList.remove('hidden');
            
            // 5秒后自动隐藏
            setTimeout(() => {
                alertContainer.classList.add('hidden');
            }, 5000);
        }
        
        // 隐藏系统消息
        function hideAlert() {
            document.getElementById('system-alert').classList.add('hidden');
        }
        
        // 加载电费数据
        function loadElectricityData() {
            hideAlert();
            showLoadingState();
            
            // 尝试从服务器加载数据
            fetch(DATA_FILE_PATH)
                .then(response => {
                    if (!response.ok) {
                        // 如果服务器请求失败，尝试使用本地存储的备份数据
                        console.warn(`从服务器加载数据失败，状态码: ${response.status}，尝试使用本地备份数据`);
                        const backupData = localStorage.getItem('electricityDataBackup');
                        
                        if (backupData) {
                            showAlert('使用本地备份数据，可能不是最新的', 'warning');
                            return JSON.parse(backupData);
                        }
                        
                        // 如果没有备份数据，抛出错误
                        throw new Error(`数据加载失败，状态码: ${response.status}`);
                    }
                    return response.json();
                })
                .then(data => {
                    // 验证数据格式是否正确
                    if (!Array.isArray(data) || data.length === 0) {
                        throw new Error('数据格式不正确或为空');
                    }
                    
                    // 保存数据到本地存储作为备份
                    try {
                        localStorage.setItem('electricityDataBackup', JSON.stringify(data));
                    } catch (e) {
                        console.warn('无法保存数据到本地存储:', e);
                    }
                    
                    // 按时间排序（确保数据是按时间升序排列）
                    electricityData = data.sort((a, b) => new Date(a.timestamp) - new Date(b.timestamp));
                    
                    // 处理数据，计算每小时用电量
                    processElectricityData();
                    
                    // 更新UI和图表
                    updateUI();
                    // 显示当前选中范围的数据
                    filterDataByRange(currentRangeType);
                    
                    // 设置日期选择器的默认值
                    if (processedData.length > 0) {
                        const firstDate = new Date(processedData[0].timestamp).toISOString().split('T')[0];
                        const lastDate = new Date(processedData[processedData.length - 1].timestamp).toISOString().split('T')[0];
                        
                        // 只有在未选择自定义日期时才设置默认值
                        if (currentRangeType !== 'custom') {
                            document.getElementById('start-date').value = firstDate;
                            document.getElementById('end-date').value = lastDate;
                        }
                    }
                })
                .catch(error => {
                    console.error('加载数据失败:', error);
                    document.getElementById('data-table-body').innerHTML = `
                        <tr>
                            <td colspan="5" class="px-6 py-10 text-center text-danger">
                                <i class="fa fa-exclamation-triangle mr-2"></i>加载数据失败: ${error.message}
                                <div class="mt-2 text-sm">
                                    <button id="retry-load" class="text-primary hover:underline">重试</button>
                                </div>
                            </td>
                        </tr>
                    `;
                    
                    // 绑定重试按钮事件
                    document.getElementById('retry-load').addEventListener('click', function() {
                        loadElectricityData();
                    });
                });
        }
        
        // 处理数据，计算每小时用电量
        function processElectricityData() {
            processedData = [];
            
            if (electricityData.length === 0) return;
            
            // 添加第一条记录（没有前一小时数据，用电量为0）
            processedData.push({
                ...electricityData[0],
                usage: 0,
                cost: 0,
                isPayment: false // 标记是否为缴费记录
            });
            
            // 计算后续每条记录与前一小时的用电量差异
            for (let i = 1; i < electricityData.length; i++) {
                try {
                    const current = electricityData[i];
                    const previous = electricityData[i - 1];
                    
                    // 验证数据是否包含必要字段
                    if (!current.timestamp || !current.surplus || !previous.timestamp || !previous.surplus) {
                        console.warn(`跳过无效数据记录 #${i}，缺少必要字段`);
                        continue;
                    }
                    
                    // 计算电费差额（前一小时减去当前，因为余额减少等于用电量）
                    const balanceDiff = parseFloat(previous.surplus) - parseFloat(current.surplus);
                    
                    // 判断是否为缴费记录（余额增加，即balanceDiff为负）
                    const isPayment = balanceDiff < 0;
                    
                    // 计算用电量（电费差额 / 电价）
                    const usage = isPayment ? 0 : parseFloat((balanceDiff / ELECTRICITY_PRICE).toFixed(2));
                    
                    // 计算电费
                    const cost = isPayment ? 0 : parseFloat((usage * ELECTRICITY_PRICE).toFixed(2));
                    
                    processedData.push({
                        ...current,
                        usage: usage,
                        cost: cost,
                        isPayment: isPayment,
                        paymentAmount: isPayment ? parseFloat((-balanceDiff).toFixed(2)) : 0
                    });
                } catch (e) {
                    console.warn(`处理数据记录 #${i} 时出错:`, e);
                }
            }
        }
        
        // 按时间范围筛选数据
        function filterDataByRange(rangeType) {
            if (processedData.length === 0) {
                showAlert('没有可用数据，请稍后重试', 'warning');
                return;
            }
            
            const now = new Date();
            let filteredData = [];
            let rangeStart, rangeEnd;
            
            // 根据选择的时间范围筛选数据
            switch(rangeType) {
                case 'today':
                    // 今天（从0点到现在）
                    rangeStart = new Date(now.getFullYear(), now.getMonth(), now.getDate());
                    rangeEnd = now;
                    break;
                    
                case 'yesterday':
                    // 昨天
                    rangeStart = new Date(now.getFullYear(), now.getMonth(), now.getDate() - 1);
                    rangeEnd = new Date(now.getFullYear(), now.getMonth(), now.getDate());
                    break;
                    
                case 'daybefore':
                    // 前天
                    rangeStart = new Date(now.getFullYear(), now.getMonth(), now.getDate() - 2);
                    rangeEnd = new Date(now.getFullYear(), now.getMonth(), now.getDate() - 1);
                    break;
                    
                case 'thisweek':
                    // 本周（周一到现在）
                    const dayOfWeek = now.getDay() || 7; // 转换为1-7，1是周一，7是周日
                    rangeStart = new Date(now);
                    rangeStart.setDate(now.getDate() - (dayOfWeek - 1));
                    rangeStart.setHours(0, 0, 0, 0);
                    rangeEnd = now;
                    break;
                    
                case 'lastweek':
                    // 上周
                    const lastWeekDay = now.getDay() || 7;
                    rangeStart = new Date(now);
                    rangeStart.setDate(now.getDate() - (lastWeekDay - 1) - 7);
                    rangeStart.setHours(0, 0, 0, 0);
                    
                    rangeEnd = new Date(rangeStart);
                    rangeEnd.setDate(rangeStart.getDate() + 7);
                    break;
                    
                case 'thismonth':
                    // 本月
                    rangeStart = new Date(now.getFullYear(), now.getMonth(), 1);
                    rangeEnd = now;
                    break;
                    
                case 'lastmonth':
                    // 上月
                    rangeStart = new Date(now.getFullYear(), now.getMonth() - 1, 1);
                    rangeEnd = new Date(now.getFullYear(), now.getMonth(), 1);
                    break;
            }
            
            // 筛选数据
            filteredData = processedData.filter(item => {
                try {
                    const itemDate = new Date(item.timestamp);
                    return itemDate >= rangeStart && itemDate <= rangeEnd;
                } catch (e) {
                    console.warn(`筛选数据时出错:`, e);
                    return false;
                }
            });
            
            // 更新图表和表格
            updateChart(filteredData, rangeType);
            updateTable(filteredData);
            updatePeriodUsage(filteredData, rangeType);
        }
        
        // 按自定义日期范围筛选数据
        function filterDataByCustomRange(startDate, endDate) {
            if (processedData.length === 0) {
                showAlert('没有可用数据，请稍后重试', 'warning');
                return;
            }
            
            try {
                // 将字符串日期转换为Date对象，并设置时间范围
                const rangeStart = new Date(startDate);
                rangeStart.setHours(0, 0, 0, 0);
                
                const rangeEnd = new Date(endDate);
                rangeEnd.setHours(23, 59, 59, 999);
                
                // 筛选数据
                const filteredData = processedData.filter(item => {
                    const itemDate = new Date(item.timestamp);
                    return itemDate >= rangeStart && itemDate <= rangeEnd;
                });
                
                // 更新图表和表格
                updateChart(filteredData, 'custom');
                updateTable(filteredData);
                updatePeriodUsage(filteredData, 'custom');
            } catch (e) {
                console.error('自定义日期筛选出错:', e);
                showAlert('日期筛选出错，请检查日期格式', 'warning');
            }
        }
        
        // 更新UI显示
        function updateUI() {
            if (processedData.length === 0) {
                document.getElementById('data-table-body').innerHTML = `
                    <tr>
                        <td colspan="5" class="px-6 py-10 text-center text-gray-500">
                            <i class="fa fa-info-circle mr-2"></i>暂无数据记录
                        </td>
                    </tr>
                `;
                return;
            }
            
            // 更新状态卡片
            const lastRecord = processedData[processedData.length - 1];
            const firstRecord = processedData[0];
            
            document.getElementById('current-balance').textContent = parseFloat(lastRecord.surplus).toFixed(2) + ' 元';
            document.getElementById('last-update').textContent = lastRecord.timestamp;
            document.getElementById('record-count').textContent = processedData.length;
            document.getElementById('room-name').textContent = lastRecord.room_name || '未知房间';
            
            // 格式化日期范围
            const firstDate = new Date(firstRecord.timestamp).toLocaleDateString();
            const lastDate = new Date(lastRecord.timestamp).toLocaleDateString();
            document.getElementById('date-range').textContent = `${firstDate} 至 ${lastDate}`;
        }
        
        // 更新筛选期间的用电量
        function updatePeriodUsage(filteredData, rangeType) {
            // 根据当前范围类型生成显示文本
            let rangeText = '';
            switch(rangeType) {
                case 'today': rangeText = '今天'; break;
                case 'yesterday': rangeText = '昨天'; break;
                case 'daybefore': rangeText = '前天'; break;
                case 'thisweek': rangeText = '本周'; break;
                case 'lastweek': rangeText = '上周'; break;
                case 'thismonth': rangeText = '本月'; break;
                case 'lastmonth': rangeText = '上月'; break;
                case 'custom': 
                    const start = document.getElementById('start-date').value;
                    const end = document.getElementById('end-date').value;
                    rangeText = `${start} 至 ${end}`;
                    break;
            }
            
            // 计算总用电量，排除缴费记录
            const totalUsage = filteredData.reduce((sum, item) => {
                return item.isPayment ? sum : sum + item.usage;
            }, 0);
            
            const totalCost = totalUsage * ELECTRICITY_PRICE;
            
            document.getElementById('period-usage').textContent = totalUsage.toFixed(2) + ' 度';
            document.getElementById('period-cost').textContent = totalCost.toFixed(2) + ' 元';
        }
        
        // 更新表格数据
        function updateTable(filteredData) {
            if (filteredData.length === 0) {
                document.getElementById('data-table-body').innerHTML = `
                    <tr>
                        <td colspan="5" class="px-6 py-10 text-center text-gray-500">
                            <i class="fa fa-info-circle mr-2"></i>该时间范围内暂无数据
                        </td>
                    </tr>
                `;
                return;
            }
            
            let tableHtml = '';
            // 倒序显示，最新的记录在前面
            const displayRecords = [...filteredData].reverse();
            
            displayRecords.forEach((record, index) => {
                // 获取上一条记录的时间（用于显示时间段）
                const prevRecord = index < displayRecords.length - 1 
                    ? displayRecords[index + 1] 
                    : null;
                
                // 时间范围显示（使用"开始统计时"替代"现在"）
                const timeRange = prevRecord 
                    ? `${prevRecord.timestamp} - ${record.timestamp}`
                    : `${record.timestamp}`;
                
                // 备注信息
                const remark = record.isPayment 
                    ? `<span class="payment-indicator"><i class="fa fa-plus-circle mr-1"></i>缴费 ${record.paymentAmount} 元</span>`
                    : '';
                
                tableHtml += `
                    <tr class="hover:bg-gray-50 transition ${record.isPayment ? 'bg-green-50' : ''}">
                        <td class="px-6 py-4 whitespace-nowrap text-sm text-gray-500">${timeRange}</td>
                        <td class="px-6 py-4 whitespace-nowrap text-sm font-medium text-gray-900">${parseFloat(record.surplus).toFixed(2)}</td>
                        <td class="px-6 py-4 whitespace-nowrap text-sm font-medium ${!record.isPayment && record.usage > 5 ? 'text-danger' : 'text-secondary'}">
                            ${record.usage.toFixed(2)}
                        </td>
                        <td class="px-6 py-4 whitespace-nowrap text-sm font-medium text-primary">
                            ${record.cost.toFixed(2)}
                        </td>
                        <td class="px-6 py-4 whitespace-nowrap text-sm">
                            ${remark}
                        </td>
                    </tr>
                `;
            });
            
            document.getElementById('data-table-body').innerHTML = tableHtml;
        }
        
        // 初始化图表
        function updateChart(filteredData, rangeType) {
            if (filteredData.length < 2) {
                // 数据不足，清空图表
                if (electricityChart) {
                    electricityChart.destroy();
                    electricityChart = null;
                }
                return;
            }
            
            const ctx = document.getElementById('electricityChart').getContext('2d');
            
            // 如果图表已存在，先销毁
            if (electricityChart) {
                electricityChart.destroy();
            }
            
            // 准备图表数据
            const labels = filteredData.map(item => {
                const date = new Date(item.timestamp);
                
                // 根据时间范围显示不同的标签格式
                if (rangeType === 'today' || rangeType === 'yesterday' || rangeType === 'daybefore') {
                    // 单日范围内只显示小时
                    return `${date.getHours()}:00`;
                } else if (rangeType === 'thisweek' || rangeType === 'lastweek') {
                    const weekdays = ['周日', '周一', '周二', '周三', '周四', '周五', '周六'];
                    return `${weekdays[date.getDay()]} ${date.getHours()}:00`;
                } else if (rangeType === 'thismonth' || rangeType === 'lastmonth') {
                    return `${date.getDate()}日 ${date.getHours()}:00`;
                } else { // custom
                    return `${date.getMonth() + 1}/${date.getDate()} ${date.getHours()}:00`;
                }
            });
            
            // 电费余额数据
            const balanceData = filteredData.map(item => parseFloat(item.surplus));
            
            // 用电量数据（忽略缴费记录）
            const usageData = filteredData.map(item => item.isPayment ? null : item.usage);
            
            // 缴费记录标记点
            const paymentData = filteredData.map(item => item.isPayment ? item.surplus : null);
            
            // 创建图表
            try {
                electricityChart = new Chart(ctx, {
                    type: 'line',
                    data: {
                        labels: labels,
                        datasets: [
                            // 电费余额数据集
                            {
                                label: '电费余额 (元)',
                                data: balanceData,
                                backgroundColor: 'rgba(59, 130, 246, 0.1)',
                                borderColor: 'rgba(59, 130, 246, 1)',
                                borderWidth: 2,
                                pointBackgroundColor: 'rgba(59, 130, 246, 1)',
                                pointRadius: 3,
                                pointHoverRadius: 5,
                                tension: 0.2,
                                fill: true,
                                yAxisID: 'y',
                                order: 1
                            },
                            // 用电量数据集
                            {
                                label: '每小时用电量 (度)',
                                data: usageData,
                                backgroundColor: 'rgba(16, 185, 129, 0.1)',
                                borderColor: 'rgba(16, 185, 129, 1)',
                                borderWidth: 2,
                                pointBackgroundColor: 'rgba(16, 185, 129, 1)',
                                pointRadius: 3,
                                pointHoverRadius: 5,
                                tension: 0.2,
                                fill: true,
                                yAxisID: 'y1',
                                order: 2,
                                spanGaps: true
                            },
                            // 缴费记录标记
                            {
                                label: '缴费记录',
                                data: paymentData,
                                backgroundColor: 'rgba(16, 185, 129, 1)',
                                borderColor: 'rgba(16, 185, 129, 1)',
                                borderWidth: 0,
                                pointBackgroundColor: 'rgba(16, 185, 129, 1)',
                                pointRadius: 6,
                                pointHoverRadius: 8,
                                yAxisID: 'y',
                                order: 3,
                                showLine: false
                            }
                        ]
                    },
                    options: {
                        responsive: true,
                        maintainAspectRatio: false,
                        interaction: {
                            mode: 'index',
                            intersect: false,
                        },
                        plugins: {
                            legend: {
                                display: false
                            },
                            tooltip: {
                                callbacks: {
                                    title: function(tooltipItems) {
                                        return `时间: ${tooltipItems[0].label}`;
                                    },
                                    afterLabel: function(context) {
                                        if (context.datasetIndex === 0) {
                                            const index = context.dataIndex;
                                            const record = filteredData[index];
                                            
                                            if (record.isPayment) {
                                                return `缴费: ${record.paymentAmount} 元`;
                                            } else {
                                                return `用电量: ${usageData[index]?.toFixed(2) || 0} 度 (${(usageData[index] * ELECTRICITY_PRICE || 0).toFixed(2)} 元)`;
                                            }
                                        }
                                        return '';
                                    }
                                }
                            }
                        },
                        scales: {
                            y: {
                                type: 'linear',
                                display: true,
                                position: 'left',
                                title: {
                                    display: true,
                                    text: '电费余额 (元)'
                                },
                                beginAtZero: false,
                                grid: {
                                    drawOnChartArea: false
                                }
                            },
                            y1: {
                                type: 'linear',
                                display: true,
                                position: 'right',
                                title: {
                                    display: true,
                                    text: '每小时用电量 (度)'
                                },
                                beginAtZero: true,
                                grid: {
                                    drawOnChartArea: false
                                }
                            },
                            x: {
                                grid: {
                                    display: false
                                }
                            }
                        }
                    }
                });
                
                // 添加阈值线
                addThresholdLine();
            } catch (e) {
                console.error('创建图表时出错:', e);
                showAlert('图表加载失败，请重试', 'warning');
            }
        }
        
        // 添加阈值参考线
        function addThresholdLine() {
            if (!electricityChart) return;
            
            const threshold = 20; // 阈值
            electricityChart.options.plugins.annotation = {
                annotations: {
                    line1: {
                        type: 'line',
                        yMin: threshold,
                        yMax: threshold,
                        borderColor: 'rgb(239, 68, 68)',
                        borderWidth: 2,
                        borderDash: [5, 5],
                        label: {
                            display: true,
                            content: `告警阈值 (${threshold}元)`,
                            position: 'end'
                        },
                        yAxisID: 'y'
                    }
                }
            };
            
            electricityChart.update();
        }
        
        // 重置所有时间按钮样式
        function resetAllTimeButtons() {
            document.getElementById('btn-today').className = 'px-4 py-2 rounded-md text-sm btn-inactive transition';
            document.getElementById('btn-yesterday').className = 'px-4 py-2 rounded-md text-sm btn-inactive transition';
            document.getElementById('btn-daybefore').className = 'px-4 py-2 rounded-md text-sm btn-inactive transition';
            document.getElementById('btn-thisweek').className = 'px-4 py-2 rounded-md text-sm btn-inactive transition';
            document.getElementById('btn-lastweek').className = 'px-4 py-2 rounded-md text-sm btn-inactive transition';
            document.getElementById('btn-thismonth').className = 'px-4 py-2 rounded-md text-sm btn-inactive transition';
            document.getElementById('btn-lastmonth').className = 'px-4 py-2 rounded-md text-sm btn-inactive transition';
            document.getElementById('btn-custom').className = 'px-4 py-2 rounded-md text-sm bg-gray-200 text-gray-700 hover:bg-gray-300 transition';
        }
        
        // 设置激活的时间按钮样式
        function setActiveTimeButton(buttonId) {
            resetAllTimeButtons();
            document.getElementById(buttonId).className = 'px-4 py-2 rounded-md text-sm btn-active transition';
        }
    </script>
</body>
</html>
